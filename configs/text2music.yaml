# @package __global__

classifier_free_guidance:
  training_dropout: 0.3
  inference_coef: 3.0

attribute_dropout: {}

fuser:
  cross_attention_pos_emb: false
  cross_attention_pos_emb_scale: 1
  sum: []
  prepend: []
  cross: [description]
  input_interpolate: []

conditioners:
  description:
    model: t5
    t5:
      name: t5-base
      finetune: false
      word_dropout: 0.3
      normalize_text: false

# drop_other_p в исходном коде не совсем корректно использован
# он отражает вероятность оставить поле, а не выкинуть его...
# логика инвертирована

dataset:
  train:
    merge_text_p: 0.3
    drop_desc_p: 0.1
    drop_other_p: 0.5
  valid:
    merge_text_p: 1.0
    drop_desc_p: 0.0
    drop_other_p: 1.0
  evaluate:
    merge_text_p: 1.0
    drop_desc_p: 0.0
    drop_other_p: 1.0
  generate:
    merge_text_p: 1.0
    drop_desc_p: 0.0
    drop_other_p: 1.0
